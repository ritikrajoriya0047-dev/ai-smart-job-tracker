<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Job Tracker — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .brand-title {
      font-size: 24px;
      font-weight: 700;
      color: #0f3460;
      text-align: center;
      margin-bottom: 4px;
    }
    .brand-sub {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: #f0f0f0;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #0f3460;
      color: white;
      border-radius: 8px;
    }
    .tab-wrap {
      display: flex;
      gap: 4px;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px;
      border: 1.5px solid #e0e0e0;
    }
    .form-control:focus {
      border-color: #0f3460;
      box-shadow: none;
    }
    .btn-main {
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-main:hover { background: #1a4a7a; }
    .error-msg {
      color: #dc3545;
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
      display: none;
    }
    .success-msg {
      color: #198754;
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="brand-title">🎯 AI Smart Job Tracker</div>
  <div class="brand-sub">Manage your job applications smartly</div>

  <!-- Tabs -->
  <div class="tab-wrap">
    <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Login</button>
    <button class="tab-btn" id="tab-register" onclick="showTab('register')">Register</button>
  </div>

  <!-- Login Form -->
  <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="login-email" placeholder="you@email.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="login-password" placeholder="Your password">
    </div>
    <button type="submit" class="btn-main">Login</button>
    <div class="error-msg" id="login-error"></div>
  </form>

  <!-- Register Form -->
  <form id="register-form" onsubmit="event.preventDefault(); doRegister();" style="display:none">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" id="reg-name" placeholder="Your full name">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="reg-email" placeholder="you@email.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="reg-password" placeholder="Create a password">
    </div>
    <button type="submit" class="btn-main">Create Account</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
  </form>
</div>

<script>
/**
 * Switch between the Login and Register tabs in the UI.
 * @param {string} tab - The tab name to show ('login' or 'register').
 */
function showTab(tab) {
  document.getElementById('login-form').style.display = (tab === 'login') ? 'block' : 'none';
  document.getElementById('register-form').style.display = (tab === 'register') ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

/**
 * Handle user login by submitting credentials to the backend.
 */
async function doLogin() {
  const emailInput = document.getElementById('login-email').value.trim();
  const passwordInput = document.getElementById('login-password').value;
  const errorElement = document.getElementById('login-error');

  // Basic client-side validation saves a wasteful HTTP roundtrip to the server 
  // if the user just accidentally clicked the button too early.
  if (!emailInput || !passwordInput) {
    showError(errorElement, 'Please fill in all fields');
    return;
  }

  try {
    const response = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailInput, password: passwordInput })
    });
    
    const data = await response.json();

    if (!response.ok) {
      showError(errorElement, data.detail || 'Login failed');
      return;
    }

    // Persist session details securely in localStorage. 
    // We use localStorage instead of cookies here because this is a simple SPA 
    // and we need to immediately use `data.name` in the UI header across page loads.
    sessionStorage.setItem('user_name', data.name);
    sessionStorage.setItem('user_email', data.email);
    sessionStorage.setItem('user_id', data.user_id);
    window.location.href = '/dashboard';

  } catch (error) {
    console.error('Login Error:', error);
    showError(errorElement, 'Something went wrong. Try again.');
  }
}

/**
 * Handle new user registration.
 * Creates an account and seamlessly redirects the user to the login tab.
 */
async function doRegister() {
  const nameInput = document.getElementById('reg-name').value.trim();
  const emailInput = document.getElementById('reg-email').value.trim();
  const passwordInput = document.getElementById('reg-password').value;
  const errorElement = document.getElementById('reg-error');
  const successElement = document.getElementById('reg-success');

  if (!nameInput || !emailInput || !passwordInput) {
    showError(errorElement, 'Please fill in all fields');
    return;
  }
  if (passwordInput.length < 6) {
    showError(errorElement, 'Password must be at least 6 characters');
    return;
  }

  try {
    const response = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: nameInput, email: emailInput, password: passwordInput })
    });
    
    const data = await response.json();

    if (!response.ok) {
      showError(errorElement, data.detail || 'Registration failed');
      return;
    }

    // Show success and gently transition to the login tab
    errorElement.style.display = 'none';
    successElement.style.display = 'block';
    successElement.textContent = 'Account created! Switching to login...';
    setTimeout(() => showTab('login'), 1500);

  } catch (error) {
    console.error('Registration Error:', error);
    showError(errorElement, 'Something went wrong. Try again.');
  }
}

/**
 * Display an error message gracefully.
 * @param {HTMLElement} element - The DOM element to populate.
 * @param {string} msg - The error message.
 */
function showError(element, msg) {
  element.textContent = msg;
  element.style.display = 'block';
}

// If already logged in go straight to dashboard
if (sessionStorage.getItem('user_name')) {
  window.location.href = '/dashboard';
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    if (document.getElementById('login-form').style.display !== 'none') {
      event.preventDefault();
      doLogin();
    } else if (document.getElementById('register-form').style.display !== 'none') {
      event.preventDefault();
      doRegister();
    }
  }
});
</script>
</body>
</html>
